# Sample Telegraf config for kinesis-consumer-go metrics.
#
# Pipeline: consumer --(UDP statsd, Datadog-style tags)--> Telegraf --> InfluxDB.
#
# Wire the consumer with the in-repo reporter:
#
#     reporter, err := statsd.New("localhost:8125")   // pkg/metrics/statsd
#     ...
#     consumer.New(cfg, client, store, handler, consumer.WithMetrics(reporter))
#
# The library emits dot-delimited names (kinesis_consumer.records_processed).
# Telegraf's statsd input converts the dots using metric_separator (default
# "_"), so InfluxDB measurements are named kinesis_consumer_records_processed,
# kinesis_consumer_handler_duration, etc. The Grafana dashboards shipped under
# dashboards/ query those underscore names — do
# not change metric_separator if you want the dashboards to work unmodified.

[agent]
  interval = "10s"
  flush_interval = "10s"

[[inputs.statsd]]
  protocol = "udp"
  service_address = ":8125"

  ## Parse the Datadog tag extension (|#key:value,...) the reporter emits.
  ## Tags become InfluxDB tags: stream, shard, handler, policy, kind, outcome.
  datadog_extensions = true

  ## Keeps measurement names underscore-delimited (see header comment).
  metric_separator = "_"

  ## Reset statsd aggregates after every flush interval so counters report
  ## per-interval deltas rather than process-lifetime totals.
  delete_gauges = true
  delete_counters = true
  delete_sets = true
  delete_timings = true

  ## Aggregations computed for |ms timings (handler_duration,
  ## get_records_duration, checkpoint_save_duration, lease_acquire_duration,
  ## rebalance_pass_duration, drain_duration). Each becomes a field:
  ## mean, median, upper, lower, stddev, count, and the percentiles below.
  percentiles = [50.0, 90.0, 95.0, 99.0]
  percentile_limit = 1000

  allowed_pending_messages = 10000

## ---------------------------------------------------------------------------
## InfluxDB v2 output (active).
## The Grafana dashboards under dashboards/ use InfluxQL, which reaches an
## InfluxDB v2 bucket through a DBRP mapping; dashboards/README.md documents
## the one-time setup.
## ---------------------------------------------------------------------------
[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  token = "$INFLUX_TOKEN"
  organization = "your-org"
  bucket = "kinesis-consumer"

## ---------------------------------------------------------------------------
## InfluxDB v1 output (alternative): comment the v2 block above and uncomment
## this one. InfluxQL dashboards work against v1 databases natively, no DBRP
## mapping needed.
## ---------------------------------------------------------------------------
