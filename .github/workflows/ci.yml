# Unit gate: formatting, vet, static analysis, compilation, and the unit test
# suite across every module in the workspace, plus a compile-check of the
# integration suite. Deliberately infra-free — it never runs the integration
# suite itself, which needs LocalStack + Valkey (that is the separate
# integration workflow). It extends the pre-commit hook (make fmt-check + vet +
# build + test): CI additionally runs `make lint` (staticcheck),
# `make integration-build`, `make test-race` (race detector over the
# concurrency-heavy packages plus the Valkey module), `make tidy-check`
# (`go mod tidy -diff` per module), and `make vulncheck` (govulncheck over
# both published modules), which the fast offline local hook leaves out. A
# separate job builds/tests pkg/backend/valkey with GOWORK=off — against its
# pinned core version, as a third party would — to catch tag/format skew
# between the two published modules (skips with a notice until the first
# release tags exist; see scripts/module-gates.sh).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref, so a
# rapid series of pushes doesn't queue redundant runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the unit gate only reads the checkout.
permissions:
  contents: read

jobs:
  unit:
    name: Unit gate
    runs-on: ubuntu-latest
    env:
      # Pin GOCACHE to a workspace path so it is stable across steps and cached
      # by actions/setup-go. The Makefile uses `GOCACHE ?=`, which defers to this
      # environment value (env vars count as defined in Make), so the build cache
      # lives here rather than at the macOS-only default the Makefile falls back
      # to.
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Single source of truth for the Go version (currently 1.26); stays
          # in lockstep with the module rather than a hardcoded literal here.
          go-version-file: go.mod
          # Always resolve the newest patched 1.26.x rather than a stale
          # runner-cached toolchain: govulncheck also scans the standard
          # library of the toolchain in use, so "zero reachable findings"
          # requires running on a patched Go.
          check-latest: true
          # This is a multi-module workspace, so cache off every module's go.sum
          # plus the workspace sum file.
          cache-dependency-path: |
            go.sum
            pkg/backend/valkey/go.sum
            examples/valkey/go.sum
            test/integration/go.sum
            go.work.sum

      - name: gofmt check
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: staticcheck
        run: make lint

      - name: build
        run: make build

      - name: integration compile check
        run: make integration-build

      - name: unit tests
        run: make test

      - name: race tests
        run: make test-race

      - name: go mod tidy gate
        run: make tidy-check

      - name: govulncheck
        run: make vulncheck

  gowork-off:
    name: Backend vs pinned core (GOWORK=off)
    runs-on: ubuntu-latest
    env:
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          # Only the backend module is exercised here, but keep the cache key
          # aligned with the unit gate so the two jobs share entries.
          cache-dependency-path: |
            go.sum
            pkg/backend/valkey/go.sum
            examples/valkey/go.sum
            test/integration/go.sum
            go.work.sum

      # Build and test the Valkey backend with the workspace overrides OFF, so
      # its pinned `require` of the core module resolves against the published
      # tag exactly as a third-party `go get` would. Pre-first-release (no tags
      # on the remote yet) the pinned version is unresolvable by construction,
      # and the gate skips with a notice instead of failing; once v0.1.0 exists
      # this runs unconditionally and catches version skew or a stale go.sum.
      - name: GOWORK=off build and test pkg/backend/valkey
        run: make test-gowork-off
